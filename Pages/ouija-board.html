<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ouija Board</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
     <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link rel="stylesheet" href="../Css/home.css" />
</head>

<body>
   <!-- Navbar-->
    <nav class="navbar navbar-dark fixed-top" id="navbar">
        <div class="container">


            <a class="navbar-brand fw-bold" href="../index.html">After Dark</a>

            <!-- Desktop menu links (hidden on mobile) -->
            <ul class="nav d-none d-lg-flex">
                <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#chapters">Chapters</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#howtoplay">Instructions</a></li>
            </ul>

            <!-- Hamburger button (mobile only) -->
            <button class="hamburger d-lg-none" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="menu-close" id="menuClose">&times;</button>
        <ul>
            <li><a href="../index.html" class="menu-link">Home</a></li>
            <li><a href="../index.html#chapters" class="menu-link">Chapters</a></li>
            <li><a href="../index.html#howtoplay" class="menu-link">Instructions</a></li>
        </ul>
    </div>

    <!-- Chapter Section -->
    <section id="chapter-hero" class="hero-section text-center" style="padding: 100px 20px;">
        <div class="container d-flex flex-column align-items-center">

            <!-- Chapter Card -->
            <div class="col-12 col-sm-6 col-md-4 mb-4">
                <a href="../Podcast-logo/ouija-board.html" class="text-decoration-none card-link">
                    <div class="card bg-dark text-white h-100 chapter-card">
                        <div class="chapter-img-wrap">
                            <img src="../Assets/img/ouija-board.png" class="card-img-top" alt="Chapter 1">
                        </div>
                        <div class="card-body text-center">
                            <h5 class="card-title mt-1">Ouija Board</h5>
                        </div>
                    </div>
                </a>
            </div>


            <div class="mb-4"></div>

                   <!-- Audio Player -->
      <div class="ad-audio-player mx-auto">

        <!-- LABEL -->
        <div class="audio-label">
          <span class="music-icon">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
            </svg>
          </span>
          <span>Introduction Audio</span>
        </div>

        <!-- CONTROLS ROW -->
        <div class="audio-controls">

          <!-- PLAY / PAUSE -->
          <button class="audio-btn" id="playBtn" onclick="togglePlay()" aria-label="Play/Pause">
            <svg id="playIcon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="pauseIcon" viewBox="0 0 24 24" width="12" height="12" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:none">
              <path d="M6 19h4V5H6zm8-14v14h4V5z"/>
            </svg>
          </button>

          <!-- STOP -->
          <button class="audio-btn" onclick="stopAudio()" aria-label="Stop">
            <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 6h12v12H6z"/>
            </svg>
          </button>

          <!-- REPLAY -->
          <button class="audio-btn" onclick="replayAudio()" aria-label="Replay">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
            </svg>
          </button>

          <!-- PROGRESS -->
          <div class="audio-progress-wrap">
            <div class="audio-progress-bg" id="progressBg" onclick="seekAudio(event)">
              <div class="audio-progress-bar" id="progressBar"></div>
            </div>
            <span class="audio-time" id="audioTime">0:00</span>
          </div>

        </div>

      </div>

      <audio id="mainAudio" src="../Assets/audio/ouija-board.mp3"></audio>


                                           <!-- With this: -->
<button id="scanBtn" class="reward-btn-home" onclick="openQrScanner()"> Scan Another Card</button>
<a id="backBtn" class="reward-btn-home" style="font-size:0.85rem; color: black; border-color: var(--gold);">← Back to Chapter</a>

<!-- QR Scanner Modal -->
<div id="qrModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; flex-direction:column; align-items:center; justify-content:center;">
  <p style="font-family:'Cinzel',serif; color:var(--gold); letter-spacing:0.15em; font-size:0.85rem; margin-bottom:16px;">POINT CAMERA AT QR CODE</p>
  <video id="qrVideo" style="width:280px; height:280px; border-radius:12px; border:2px solid var(--gold); object-fit:cover;"></video>
  <canvas id="qrCanvas" style="display:none;"></canvas>
  <p id="qrStatus" style="color:#aaa; font-size:0.8rem; margin-top:12px;">Scanning...</p>
  <button onclick="closeQrScanner()" style="margin-top:16px; background:none; border:1px solid rgba(233,177,9,0.4); color:var(--gold); border-radius:8px; padding:8px 24px; font-family:'Cinzel',serif; font-size:0.78rem; cursor:pointer;">Cancel</button>
</div>
        
        </div>


        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center py-3 bg-dark site-footer">
        <p class="text-warning d-block mb-1 footer-title">After Dark</p>
        <p class="small mb-1">Round Table After Dark · Inspired by Ravensburger Echoes</p>
        <p class="small mb-0">&copy; 2026 After Dark Team. All rights reserved.</p>
    </footer>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../Script/home.js"></script>
    <script>
        // Get where user came from
        const params = new URLSearchParams(window.location.search);
        const from = params.get("from");

        // Map chapters
        const chapterPages = {
            "podcast-logo": "../Podcast-logo/podcast-logo.html",
            "a-cross": "../A-cross/a-cross.html",
            "female-demon": "../Female-demon/female-demon.html"
        };

        // Set back button
        const backBtn = document.getElementById("backBtn");

        if (from && chapterPages[from]) {
            backBtn.href = chapterPages[from];
        } else {
            backBtn.href = "../index.html"; // fallback
        }
    </script>
</body>

</html>
