<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planchette</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../Css/home.css" />
</head>

<body>
    <!-- Navbar-->
    <nav class="navbar navbar-dark fixed-top" id="navbar">
        <div class="container">


            <a class="navbar-brand fw-bold" href="../index.html">After Dark</a>

            <!-- Desktop menu links (hidden on mobile) -->
            <ul class="nav d-none d-lg-flex">
                <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#chapters">Chapters</a></li>
                <li class="nav-item"><a class="nav-link" href="../index.html#howtoplay">Instructions</a></li>
            </ul>

            <!-- Hamburger button (mobile only) -->
            <button class="hamburger d-lg-none" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

        </div>
    </nav>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="menu-close" id="menuClose">&times;</button>
        <ul>
            <li><a href="../index.html" class="menu-link">Home</a></li>
            <li><a href="../index.html#chapters" class="menu-link">Chapters</a></li>
            <li><a href="../index.html#howtoplay" class="menu-link">Instructions</a></li>
        </ul>
    </div>

    <!-- Chapter Section -->
    <section id="chapter-hero" class="hero-section text-center" style="padding: 100px 20px;">
        <div class="container d-flex flex-column align-items-center">

            <!-- Chapter Card -->
            <div class="col-12 col-sm-6 col-md-4 mb-4">
                <a href="../A-cross/planchette.html" class="text-decoration-none card-link">
                    <div class="card bg-dark text-white h-100 chapter-card">
                        <div class="chapter-img-wrap">
                            <img src="../Assets/img/planchette.png" class="card-img-top" alt="Chapter 1">
                        </div>
                        <div class="card-body text-center">
                            <h5 class="card-title mt-1">Planchette</h5>
                        </div>
                    </div>
                </a>
            </div>


            <div class="mb-4"></div>

            <!-- Audio Player -->
            <div class="audio-box mx-auto">
                <p class="audio-label text-warning">🎧 Planchette Audio</p>
                <audio id="mainAudio" controls src="../Assets/audio/planchette.mp3"></audio>
                <a id="backBtn" class="btn btn-warning mt-4">← Back to Chapter</a>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center py-3 bg-dark site-footer">
        <p class="text-warning d-block mb-1 footer-title">After Dark</p>
        <p class="small mb-1">Round Table After Dark · Inspired by Ravensburger Echoes</p>
        <p class="small mb-0">&copy; 2026 After Dark Team. All rights reserved.</p>
    </footer>
    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../Script/home.js"></script>
    <script>
        // Get where user came from
        const params = new URLSearchParams(window.location.search);
        const from = params.get("from");

        // Map chapters
        const chapterPages = {
            "podcast-logo": "../Podcast-logo/podcast-logo.html",
            "a-cross": "../A-cross/a-cross.html",
            "female-demon": "../Female-demon/female-demon.html"
        };

        // Set back button
        const backBtn = document.getElementById("backBtn");

        if (from && chapterPages[from]) {
            backBtn.href = chapterPages[from];
        } else {
            backBtn.href = "../index.html"; // fallback
        }
    </script>
</body>

</html>
