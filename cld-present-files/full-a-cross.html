<!-- ══════════════════════════════════════════════════════════
     URL GATE — runs instantly before page renders
     Change REQUIRED_KEY and CHAPTER_PAGE for each file:

     full-podcast-logo.html → "chapter-podcast-logo" / "../Podcast-logo/podcast-logo.html"
     full-a-cross.html      → "chapter-a-cross"      / "../A-cross/a-cross.html"
     full-female-demon.html → "chapter-female-demon" / "../Female-demon/female-demon.html"
════════════════════════════════════════════════════════════ -->
<script>
(function () {
  var REQUIRED_KEY  = "chapter-a-cross";               // ← change per file
  var CHAPTER_PAGE  = "../A-cross/a-cross.html";        // ← change per file

  if (localStorage.getItem(REQUIRED_KEY) !== "completed") {
    document.documentElement.innerHTML = `
      <!DOCTYPE html>
      <html>
        <head>
          <meta charset="UTF-8"/>
          <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
          <title>After Dark — Locked</title>
          <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
              background: #0a0a0a;
              display: flex;
              align-items: center;
              justify-content: center;
              min-height: 100vh;
              font-family: 'Segoe UI', sans-serif;
            }
            .lock-box {
              background: #111;
              border: 2px solid #e9b109;
              border-radius: 20px;
              padding: 52px 40px;
              text-align: center;
              max-width: 440px;
              width: 90%;
            }
            .lock-icon  { font-size: 4rem; margin-bottom: 16px; }
            .lock-title {
              color: #e9b109;
              font-size: 1.5rem;
              font-weight: bold;
              margin-bottom: 14px;
            }
            .lock-msg {
              color: #bbb;
              font-size: 0.95rem;
              line-height: 1.75;
              margin-bottom: 32px;
            }
            .lock-msg strong { color: #e9b109; }
            .lock-btn {
              display: inline-block;
              background: #e9b109;
              color: #000;
              border: none;
              padding: 13px 30px;
              border-radius: 10px;
              font-weight: bold;
              font-size: 1rem;
              cursor: pointer;
              text-decoration: none;
            }
            .lock-btn:hover { background: #c9980a; }
          </style>
        </head>
        <body>
          <div class="lock-box">
            <div class="lock-icon">🔒</div>
            <div class="lock-title">Don't Try To Be Smart</div>
            <div class="lock-msg">
              This chapter audio is <strong>locked</strong>.<br><br>
              You need to complete the chapter first —<br>
              find all 3 fragments, listen to the clues,<br>
              and solve the puzzle correctly.<br><br>
              Then this page will unlock itself. 👁
            </div>
            <a href="${CHAPTER_PAGE}" class="lock-btn">← Go Back &amp; Earn It</a>
          </div>
        </body>
      </html>
    `;
  }
})();
</script>

<!-- ══ Page only renders below if chapter is completed ══ -->
