    <h3 class="text-gold mb-4">Find the Fragments</h3>

    <div id="fragmentGrid" class="fragment-grid">
       <script>
const fragments = [
  {
    name: "Candles",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../Podcast-logo/candles.html?from=podcast-logo"
  },
  {
    name: "Calendar",

    link: "../Podcast-logo/calendar.html?from=podcast-logo"
  },
  {
    name: "Ouija Board",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../Podcast-logo/ouija-board.html?from=podcast-logo"
  },

  {
    name: "Cookies",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../A-cross/cookies.html?from=a-cross"
  },

  {
    name: "Planchette",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../A-cross/planchette.html?from=a-cross"
  },

  {
    name: "Birthday Cake",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../A-cross/birthday-cake.html?from=a-cross"
  },

  {
    name: "Tombstone",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../Female-demon/tombstone-with-lola-name.html?from=female-demon"
  },

  {
    name: "Bible",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../Female-demon/bible.html?from=female-demon"
  },

  {
    name: "Bloody Mic",
    img: "../Assets/img/podcast-logo-entry.png",
    link: "../Female-demon/bloody-microphone.html?from=female-demon"
  }
];


function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}


const grid = document.getElementById("fragmentGrid");

shuffle(fragments).forEach(fragment => {
  const item = `
    <a href="${fragment.link}" class="fragment-item">
      <img src="${fragment.img}" alt="${fragment.name}">
      <p>${fragment.name}</p>
    </a>
  `;
  grid.innerHTML += item;
});

</script>
